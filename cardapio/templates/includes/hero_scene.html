<div class="snack-scene" aria-hidden="true">
  <div class="scene-stage">
    <div class="orbit-ring"></div>

    <div class="scene-card scene-card-main float-a">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <span class="badge rounded-pill text-bg-warning text-dark">pedido</span>
        <span class="scene-price">R$ 31,30</span>
      </div>
      <div class="d-grid gap-2">
        <span class="scene-row"></span>
        <span class="scene-row mid"></span>
        <span class="scene-row short"></span>
      </div>
    </div>

    <div class="scene-card scene-card-menu float-b">
      <i class="bi bi-grid-3x3-gap-fill fs-3 text-warning"></i>
      <div class="fw-bold mt-2">Cardapio</div>
      <small class="text-white-50">4 categorias</small>
    </div>

    <div class="scene-card scene-card-ticket float-c">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-bag-check-fill fs-3 text-success"></i>
        <div>
          <div class="fw-bold">Retirada</div>
          <small class="text-white-50">pedido confirmado</small>
        </div>
      </div>
    </div>

    <div class="scene-cube">
      <div class="cube-face cube-front"><i class="bi bi-basket2-fill"></i></div>
      <div class="cube-face cube-back"><i class="bi bi-cup-straw"></i></div>
      <div class="cube-face cube-right"><i class="bi bi-receipt-cutoff"></i></div>
      <div class="cube-face cube-left"><i class="bi bi-stars"></i></div>
      <div class="cube-face cube-top"><i class="bi bi-lightning-charge-fill"></i></div>
      <div class="cube-face cube-bottom"><i class="bi bi-check2-circle"></i></div>
    </div>

    <span class="scene-spark spark-one"></span>
    <span class="scene-spark spark-two"></span>
    <span class="scene-spark spark-three"></span>
  </div>
</div>
